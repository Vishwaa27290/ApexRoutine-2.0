server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: apex-routine-engine
  
  datasource:
    url: jdbc:mysql://localhost:3306/apex_routine_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Vishwas$$27
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
